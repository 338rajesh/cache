project:
  type: website
  output-dir: _site

execute:
  freeze: auto

format:
  html:
    toc: true
    toc-location: right
    theme:
      light: flatly
      dark: darkly

website:
  title: "cache!"
  
  # Top navigation bar
  navbar:
    left:
      - href: index.md
        text: Home
      - href: https://338rajesh.github.io/
        text: About

  # Side navigation (Great for many notes)
  sidebar:
    style: "docked"
    search: true            # This adds a search bar automatically!
    contents:
      - section: "Machine Learning"
        contents: src/machine_learning/*
      - section: "Uncertainty Quantifcation"
        contents: src/uq/*
      - notes.md
